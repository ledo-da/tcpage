<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 호출 시스템</title>
    <link rel="stylesheet" href="sender-style.css">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("웹 앱 서비스 워커 등록 성공!"))
          .catch((err) => console.log("등록 실패:", err));
      }
    </script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>선생님 목록</h3>
            </div>
            <ul id="teacherList">
                </ul>
        </aside>

        <main class="main-content">
            <h2>선생님 호출하기</h2>
            <div class="status-box">
                <p>호출인: <strong>학생</strong></p>
                <p>선택된 선생님: <strong id="selectedTeacher">없음</strong></p>
            </div>
            <textarea id="messageInput" placeholder="(선택사항) 선생님께 전달할 메시지를 적으세요..."></textarea>
            <button id="callBtn" disabled>호출하기</button>
        </main>
    </div>
    <script src="sender-script.js"></script>
</body>
</html>
