<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님용 관제 시스템</title>
    <link rel="stylesheet" href="receiver-style.css">
    <link rel="manifest" href="manifest-receiver.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("선생님용 엔진 등록 성공!"))
          .catch((err) => console.log("등록 실패:", err));
      }
    </script>
</head>
<body>
    <!-- 가입 및 로그인 섹션 -->
    <div id="authSection" class="card">
        <h2>선생님 등록 및 로그인</h2>
        <input type="text" id="regName" placeholder="선생님 성함을 입력하세요">
        <input type="password" id="regPw" placeholder="비밀번호 설정">
        <button id="registerBtn">가입 및 로그인</button>
    </div>

    <!-- 알림 수신함 대시보드 -->
    <div id="mainSection" class="card hidden">
        <div class="dashboard-header">
            <h3 id="welcomeMessage">안녕하세요 선생님</h3>
            <button id="logoutBtn">로그아웃</button>
        </div>
        <hr>
        <h2>🔔 실시간 호출 알림</h2>
        <div id="alertBox" class="alert-box hidden">
            <h3>🚨 새로운 호출이 왔습니다!</h3>
            <p id="alertContent"></p>
            <span id="alertTime"></span>
            <button id="closeAlertBtn">확인 완료</button>
        </div>
        <p id="noNotification">현재 들어온 호출이 없습니다.</p>
        <button id="leaveBtn" class="leave-btn">회원 탈퇴 (목록에서 삭제)</button>
    </div>
    <script src="receiver-script.js"></script>
</body>
</html>
